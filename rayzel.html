<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RayzelNetwork | BoxPvP</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0d0d0d;
    color:white;
    text-align:center;
}

header{
    padding:60px 20px;
    background:linear-gradient(to bottom, #0d0d0d, #111);
}

h1{
    font-size:55px;
    color:#00ff88;
    text-shadow:0 0 15px #00ff88;
}

.ip-box{
    margin-top:20px;
    font-size:20px;
    background:#1a1a1a;
    display:inline-block;
    padding:10px 20px;
    border-radius:8px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.section{
    padding:60px 20px;
}

.vip-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.vip-card{
    width:220px;
    padding:20px;
    border-radius:12px;
    background:#1a1a1a;
    transition:0.3s;
}

.vip-card:hover{
    transform:scale(1.05);
}

.vip{
    border:2px solid yellow;
    box-shadow:0 0 15px yellow;
}

.vipplus{
    border:2px solid orange;
    box-shadow:0 0 15px orange;
}

.mvip{
    border:2px solid #00c3ff;
    box-shadow:0 0 15px #00c3ff;
}

.rayzelvip{
    border:2px solid #b84dff;
    box-shadow:0 0 20px #b84dff;
}

footer{
    padding:20px;
    background:#111;
    margin-top:40px;
}
</style>
</head>
<body>

<header>
    <h1>RayzelNetwork</h1>
    <p>Türkiye'nin En Güçlü BoxPvP Sunucusu</p>
    <div class="ip-box">
        IP: RayzelNW.aternos.me
    </div>
</header>

<div class="section">
    <h2>VIP Paketleri</h2>
    <div class="vip-container">

        <div class="vip-card vip">
            <h3>VIP</h3>
            <p>15 TL</p>
            <button>Satın Al</button>
        </div>

        <div class="vip-card vipplus">
            <h3>VIP+</h3>
            <p>25 TL</p>
            <button>Satın Al</button>
        </div>

        <div class="vip-card mvip">
            <h3>MVIP</h3>
            <p>40 TL</p>
            <button>Satın Al</button>
        </div>

        <div class="vip-card rayzelvip">
            <h3>Rayzel VIP</h3>
            <p>60 TL</p>
            <button>Satın Al</button>
        </div>

    </div>
</div>

<div class="section">
    <h2>Sunucu Hakkında</h2>
    <p>BoxPvP sistemli, rekabetçi ve eğlenceli Minecraft deneyimi!</p>
</div>

<footer>
    © 2026 RayzelNetwork - Tüm Hakları Saklıdır
</footer>

</body>
</html>
